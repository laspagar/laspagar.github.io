url: "https://kinglastehnik.com"
title: "Kinglas Tehnik: Spesialis Jasa Las & Konstruksi Besi Terbaik"
author: "Kinglas Tehnik"
description: "Kinglas Tehnik di Pemalang berpengalaman. Melayani pembuatan Kanopi, Pagar, Mezzanine, Tangga Besi, & Konstruksi Baja. Area layanan: Tegal, Pekalongan, Purbalingga, Brebes, Banjarnegara, Purwekerto. Harga bersaing, Bergaransi & Survey Gratis!" # This will show up in places like twitter, linkedin, etc, if you share your sites url as a post.

# Email / Social media user names used by the minima theme:
# All of these are optional and can be removed or commented out
email: "admin@kinglastehnik.com"
twitter_username: "twitteruser"
github_username: "githubuser"
linkedin_username: "linkedinuser"
#facebook_username: username
#flickr_username: username
#instagram_username: username
#pinterest_username: username
#youtube_username: username
#googleplus_username: +username

#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
# theme: "minima"  # Using custom layouts instead

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate-v2

# Collections
collections:
  products:
    output: true
    permalink: /products/:name/

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other

  - scope:
      path: ""
      type: products
    values:
      layout: product

pagination:
  enabled: true
  per_page: 7
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_reverse: true
  trail: 
    before: 2
    after: 2

# Pagination for products
products_pagination:
  enabled: true
  collection: 'products'
  per_page: 9
  permalink: '/products/page/:num/'
  title: ':title - page :num of :max'
  sort_field: 'title'
  sort_reverse: false
