<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">

  <title>{% if page.title %}{{ page.title }} | Bengkel Las Bandung{% else %}Bengkel Las Bandung - Jasa Pagar Minimalis,
    Kanopi & Konstruksi Baja Profesional{%
    endif %}</title>

  <meta name="description"
    content="⭐ Bengkel Las Bandung Terpercaya - Spesialis pagar minimalis, kanopi polycarbonate, railing tangga, tralis jendela & konstruksi baja. Garansi kualitas, harga terjangkau, pengerjaan cepat. Gratis konsultasi & survey!">
  <meta name="keywords"
    content="bengkel las bandung, jasa las bandung, pagar minimalis bandung, kanopi bandung, railing tangga, tralis jendela, konstruksi baja, las listrik bandung, tukang las bandung, pagar besi minimalis">
  <meta name="author" content="Bengkel Las Bandung">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <meta name="googlebot" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title"
    content="{% if page.title %}{{ page.title }}{% else %}Bengkel Las Bandung - Jasa Pagar, Kanopi & Konstruksi Baja Profesional{% endif %}">
  <meta property="og:description"
    content="Jasa las profesional di Bandung dengan 10+ tahun pengalaman. Pagar minimalis, kanopi, railing, tralis berkualitas tinggi. Harga kompetitif, garansi kepuasan 100%.">
  <meta property="og:image" content="{{ site.baseurl }}/images/og-image.jpg">
  <meta property="og:locale" content="id_ID">
  <meta property="og:site_name" content="Bengkel Las Bandung">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title"
    content="{% if page.title %}{{ page.title }}{% else %}Bengkel Las Bandung - Jasa Pagar & Kanopi Profesional{% endif %}">
  <meta name="twitter:description"
    content="Spesialis pagar minimalis, kanopi & konstruksi baja di Bandung. Gratis konsultasi!">

  <!-- Canonical URL -->
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

  <!-- Geo Tags -->
  <meta name="geo.region" content="ID-JB">
  <meta name="geo.placename" content="Bandung">
  <meta name="geo.position" content="-6.8156;107.5826">
  <meta name="ICBM" content="-6.8156, 107.5826">

  {% include meta.html %}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
</head>

<body>
  <div class="preloader" id="preloader">
    <div class="preloader-spinner"></div>
  </div>

  {% include header.html %}

  {{ content }}

  {% include footer.html %}
  {% include custom-scripts.html %}
  {% include analytics.html %}
</body>

</html>
